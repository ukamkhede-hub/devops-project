name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Show Project Files
        run: ls -la

      - name: Build Docker Image
        run: docker build -t my-app .

      - name: Run Container
        run: docker run -p 8080:80 my-app
